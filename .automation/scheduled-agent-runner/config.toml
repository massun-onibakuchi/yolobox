[paths]
state_db = "state.sqlite3"
logs_dir = "logs"

[codex]
binary = "codex"
default_model = "gpt-5.4"
allowed_models = ["gpt-5.4", "gpt-5.4-mini"]

[scheduler]
timezone = "UTC"
poll_seconds = 30
error_backoff_seconds = 5

[telegram]
bot_token = "env:TG_BOT_TOKEN"

[notifications]
send_on_start = true
send_on_success = true
send_on_failure = true
summary_chars = 1200
